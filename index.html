<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мой сайт</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            padding: 30px;
            font-size: 28px;
            font-weight: bold;
            animation: fadeDown 1s ease;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            width: 260px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: 0.4s;
            animation: fadeUp 1s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: scale(1.08) rotate(1deg);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        img {
            width: 100%;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px;
            background: white;
            color: black;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: black;
            color: white;
            transform: scale(1.1);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<header>🔥 Мой крутой сайт 🔥</header>

<div class="container">

    <div class="card">
        <a href="page1.html">
            <img src="https://www.soyuz.ru/public/uploads/files/3/7404971/20200325223331819c8fefc7.jpg">
        </a>
        <a href="page1.html" class="btn">Птички</a>
    </div>

    <div class="card">
        <a href="page2.html">
            <img src="https://avatars.mds.yandex.net/get-kinopoisk-post-img/1101693/35e3ccb14d15186c4e5eb2e7ca586e46/960x540">
        </a>
        <a href="page2.html" class="btn">Могучие рейнджеры</a>
    </div>

    <div class="card">
        <a href="page3.html">
            <img src="https://img.championat.com/s/732x488/news/big/f/a/multfilm-schenyachij-patrul-gde-smotret_1702553059703301416.jpg">
        </a>
        <a href="page3.html" class="btn">Щенячий патруль</a>
    </div>

</div>

<footer>
    © 2026 Мой сайт
</footer>

</body>
</html>
