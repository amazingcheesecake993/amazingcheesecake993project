<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PUT_TITLE_HERE</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content {
            margin-top: 50px;
        }

        h1 {
            font-size: 40px;
        }

        img {
            width: 400px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        p {
            width: 60%;
            margin: 20px auto;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 20px;
            background: white;
            color: black;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #000;
            color: #fff;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="content">

    <h1>птички</h1>

    <img src="https://www.soyuz.ru/public/uploads/files/3/7404971/20200325223331819c8fefc7.jpg">

    <p>герои</p>

    <a href="index.html" class="btn">← На главную</a>

</div>

</body>
</html>
